name: CI
on:
  push:
    branches:
      - main
      - feat/e-commerce
  pull_request:
    branches:
      - main
      - feat/e-commerce
env:
  CI: true
jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
