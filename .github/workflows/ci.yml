name: CI
on:
  push:
    branches:
      - main
      - feat/e-commerce
  pull_request:
    branches:
      - main
      - feat/e-commerce
env:
  CI: true
jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce_ci
      CLERK_PUBLISHABLE_KEY: pk_test_ci_dummy
      CLERK_SECRET_KEY: sk_test_ci_dummy
      STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      RESEND_API_KEY: re_ci_dummy
      ALLOWED_ORIGINS: http://localhost:3000
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    environment: Production
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
