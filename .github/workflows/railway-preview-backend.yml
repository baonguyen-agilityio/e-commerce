name: Railway Preview - Backend
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "backend/**"
      - ".github/workflows/railway-preview-backend.yml"
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: railway-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  deploy:
    if: ${{ github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway Preview
        id: railway
        uses: ayungavis/railway-preview-deploy@v1.0.2
        with:
          railway_api_token: ${{ secrets.RAILWAY_API_TOKEN }}
          project_id: ${{ secrets.RAILWAY_PROJECT_ID }}
          environment_name: "staging"
          preview_environment_name: "pr-${{ github.event.pull_request.number }}"
          branch_name: ${{ github.head_ref }}
          reuse_preview_environment: "true"

      - name: Comment PR with Preview URL
        if: steps.railway.outputs.service_domain != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- railway-preview-backend -->';
            const body = `${marker}
            🚀 **Backend Preview Deployed!**

            📍 **URL:** https://${{ steps.railway.outputs.service_domain }}
            🔗 **API Health:** https://${{ steps.railway.outputs.service_domain }}/health

            _Updated on commit ${{ github.sha.substring(0, 7) }}_`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const existingComment = comments.find(c => c.body.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
  cleanup:
    if: ${{ github.event.pull_request.merged == true || github.event.action == 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup Railway Preview
        uses: ayungavis/railway-preview-deploy@v1.0.2
        with:
          railway_api_token: ${{ secrets.RAILWAY_API_TOKEN }}
          project_id: ${{ secrets.RAILWAY_PROJECT_ID }}
          environment_name: "staging"
          preview_environment_name: "pr-${{ github.event.pull_request.number }}"
          branch_name: ${{ github.head_ref }}
          cleanup: "true"
