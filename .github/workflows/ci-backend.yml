name: CI - Backend

on:
  push:
    branches: [main, feat/e-commerce]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main, feat/e-commerce]
    paths:
      - 'backend/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce_ci
      DB_SSL: 'false'
      CLERK_PUBLISHABLE_KEY: pk_test_ci_dummy
      CLERK_SECRET_KEY: sk_test_ci_dummy
      STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      RESEND_API_KEY: re_ci_dummy
      ALLOWED_ORIGINS: http://localhost:3000

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:run
      - run: npm run build
